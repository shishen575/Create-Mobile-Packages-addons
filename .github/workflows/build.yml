name: Build Minecraft Forge Mod

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            GRADLE_VERSION=8.11.1
            mkdir -p gradle/wrapper
            curl -fL "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
            printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-%s-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' "${GRADLE_VERSION}" \
              > gradle/wrapper/gradle-wrapper.properties
            curl -fL "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradlew" \
              -o gradlew
          fi
          chmod +x gradlew

      - name: "Place Create: Mobile Packages jar"
        env:
          CMP_JAR_URL: ${{ secrets.CMP_JAR_URL }}
        run: |
          mkdir -p libs
          TARGET="libs/create_mobile_packages-1.20.1-0.6.1.jar"
          if [ -n "$CMP_JAR_URL" ]; then
            echo "Downloading Create: Mobile Packages jar from secrets.CMP_JAR_URL"
            curl -fL -A "Mozilla/5.0" "$CMP_JAR_URL" -o "$TARGET"
            if ! unzip -l "$TARGET" >/dev/null 2>&1; then
              echo "::error::Downloaded file is not a valid jar/zip. CMP_JAR_URL may not point directly to the jar (e.g. it returned an HTML page)."
              exit 1
            fi
          else
            echo "::error::secrets.CMP_JAR_URL is not set. Create: Mobile Packages is a third-party mod jar and cannot be redistributed in this repo. Add a repository secret named CMP_JAR_URL pointing to a download URL for the jar (e.g. a private storage link), or build locally with the jar placed in libs/."
            exit 1
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew build
        env:
          GRADLE_OPTS: "-Dfile.encoding=UTF-8"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: create-mobile-packages-addons
          path: build/libs/*.jar
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            GRADLE_VERSION=8.11.1
            mkdir -p gradle/wrapper
            curl -fL "https://github.com/gradle/gradle/raw/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
            printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-%s-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' "${GRADLE_VERSION}" \
              > gradle/wrapper/gradle-wrapper.properties
            curl -fL "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradlew" \
              -o gradlew
          fi
          chmod +x gradlew

      - name: "Place Create: Mobile Packages jar"
        env:
          CMP_JAR_URL: ${{ secrets.CMP_JAR_URL }}
        run: |
          mkdir -p libs
          TARGET="libs/create_mobile_packages-1.20.1-0.6.1.jar"
          if [ -n "$CMP_JAR_URL" ]; then
            curl -fL -A "Mozilla/5.0" "$CMP_JAR_URL" -o "$TARGET"
            if ! unzip -l "$TARGET" >/dev/null 2>&1; then
              echo "::error::Downloaded file is not a valid jar/zip. CMP_JAR_URL may not point directly to the jar."
              exit 1
            fi
          else
            echo "::error::secrets.CMP_JAR_URL is not set."
            exit 1
          fi

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew build
        env:
          GRADLE_OPTS: "-Dfile.encoding=UTF-8"

      - name: Upload JAR to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
